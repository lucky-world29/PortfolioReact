  <style>
    #portfolio-notice {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: #111;
      color: white;
      text-align: center;
      padding: 12px 20px;
      font-family: Arial, sans-serif;
      z-index: 9999;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
    }

    #portfolio-notice a {
      margin-left: 10px;
      padding: 6px 14px;
      background: #00c3ff;
      color: black;
      text-decoration: none;
      border-radius: 4px;
      font-weight: bold;
    }

    #portfolio-notice.highlight {
      animation: pulse 1s ease-in-out 3;
    }

    @keyframes pulse {
      0% {
        background: #111;
      }

      50% {
        background: #ff3c3c;
      }

      100% {
        background: #111;
      }
    }

    body {
      padding-top: 50px;
    }
  </style>
